name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  firmware_build:
    name: Build the ZMK firmware
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3

  # 1. Dongle
  - board: nice_nano
    shield: jerry
    
  # 2. Left Side (Peripheral)
  - board: nice_nano_v2
    shield: eyelash_corne_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # 3. Right Side (Peripheral)
  - board: nice_nano_v2
    shield: eyelash_corne_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # 4. Settings Reset (Optional but highly recommended for initial pairing)
  - board: nice_nano_v2
    shield: settings_reset