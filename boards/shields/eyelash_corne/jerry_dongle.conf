# dongle acts as the split central; halves are converted to peripherals via
# -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n on their build.yaml entries
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# BLE
CONFIG_BT_BAS=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# usb-name
CONFIG_USB_DEVICE_MANUFACTURER="Eyelash Peripherals"

CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

# The eyelash_corne shield's Kconfig.defconfig (tuned for the halves' 128x32
# panel) and zmk-dongle-display both default LV_Z_VDB_SIZE to 64% - a partial
# render buffer. The ssd1306/sh1106 driver rejects any flush whose y-origin
# isn't 8px-page-aligned (silently, via LOG_ERR + return -1), and any region
# that never completes a write shows the panel's power-on noise forever since
# the driver never zeroes GDDRAM on init. Force a single full-frame flush (no
# chunking, no alignment math) to rule this out as the cause of the static.
CONFIG_LV_Z_VDB_SIZE=100
