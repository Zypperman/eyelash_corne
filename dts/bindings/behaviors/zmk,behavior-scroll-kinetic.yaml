description: |
  Two axis scroll behavior with a QMK "kinetic speed" style curve: on press it
  jumps straight to initial-speed (sized so the very first trigger-period-ms
  tick already emits a whole scroll unit, i.e. no ramp-up lag on a tap), then
  linearly ramps to base-speed over time-to-base-ms for sustained holding.

compatible: "zmk,behavior-scroll-kinetic"

include: one_param.yaml

properties:
  x-input-code:
    type: int
    required: true
  y-input-code:
    type: int
    required: true
  trigger-period-ms:
    type: int
    default: 16
    description: Time (ms) between generated scroll reports while a direction is held. Mirrors QMK's MOUSEKEY_WHEEL_INTERVAL.
  delay-ms:
    type: int
    default: 0
    description: Time (ms) after press before scrolling starts. Mirrors QMK's MOUSEKEY_WHEEL_DELAY.
  initial-speed:
    type: int
    required: true
    description: Scroll speed (units/sec) used the instant the delay elapses. Mirrors QMK's MOUSEKEY_WHEEL_INITIAL_SPEED. Pick this so initial-speed * trigger-period-ms / 1000 >= 1 to guarantee a tap always registers immediately.
  base-speed:
    type: int
    required: true
    description: Steady-state scroll speed (units/sec) once time-to-base-ms has elapsed. Mirrors QMK's MOUSEKEY_WHEEL_BASE_SPEED.
  time-to-base-ms:
    type: int
    default: 0
    description: Time (ms) to linearly ramp from initial-speed to base-speed. 0 disables the ramp (base-speed applies immediately).
